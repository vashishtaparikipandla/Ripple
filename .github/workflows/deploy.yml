name: Deploy V1 and V2 to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (v1)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Checkout v2
        uses: actions/checkout@v4
        with:
          ref: v2
          path: v2-branch

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build main (v1)
        run: |
          cd main-branch
          npm ci
          npm run build

      - name: Build v2
        run: |
          cd v2-branch
          npm ci
          npm run build

      - name: Prepare artifact
        run: |
          mkdir site
          cp -r main-branch/dist/* site/
          mkdir site/v2
          cp -r v2-branch/dist/* site/v2/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
